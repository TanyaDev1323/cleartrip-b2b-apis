post:
  tags:
    - Content APIs
  description: |
      This API retrieves detailed profile information for a list of hotels based on the provided hotel IDs.

      **Features:**  
      - Fetches comprehensive details for multiple hotels.  
      - Includes hotel policies, amenities, and other relevant information.  
      - Supports batch retrieval of hotel profiles for efficient data access.

      Ideal for scenarios where multiple hotel profiles need to be fetched in a single request.

      **Constraint:**
      - Max allowed batch size for hotelIds is 50.
      - While the Hotel Batch Profile doesn’t currently support pagination via hasNextPage, the response times remain consistently fast, typically loading within a few seconds

      **Note:**
      Use the locationVersion received in the response of Location-List for {"locationVersion":"*VERSION*"} in the Request.

  summary: Get Hotel Profile in Batch
  operationId: getHotelProfileInBatch
  x-codeSamples:
    - lang: ‘Shell’
      label: 'cURL'
      source: |
        curl --location ‘https://api.cleartrip.com/hotels/api/v4/content/hotel-profiles’ \
        --header ‘X-CT-API-KEY: *API_KEY*’ \
        --header ‘x-meta-data: {"locationVersion":"*VERSION*"}’ \
        --header ‘x-request-id: *REQUEST_ID*’ \
        --header ‘Content-Type: application/json’ \
        --data ‘{
          "hotelIds": [
            "122897", "1324888"
          ]
        }’
  parameters:
    - $ref: '../../components/schemas/parameters/x-api-key-header.yaml'
    - $ref: '../../components/schemas/parameters/x-tracking-id-header.yaml'
  requestBody:
