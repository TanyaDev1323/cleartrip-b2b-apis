get:
  tags:
    - Content APIs
  description: |
      This API retrieves detailed profile information for a specific hotel based on the provided hotel ID.

      **Features:**
      - Fetches comprehensive hotel details.
      - Includes hotel policies, amenities, and other relevant information.
      - Supports accessing complete hotel profiles for display or further processing.

      Designed to provide rich and detailed hotel content efficiently.

      **Constraint:**
      - Maximum stay duration: 28 nights
      - Maximum age for children: 11 years (child ages must be 0–11 inclusive)
      - Limit: 6 rooms per request
      - Single room capacity: 1 to 8 adults

      **Note:**
      Use the locationVersion received in the response of Location-List for {"locationVersion":"*VERSION*"} in the Request.

  summary: Get Hotel Profile
  operationId: getHotelProfile
  x-codeSamples:
    - lang: 'Shell'
      label: 'cURL'
      source: |
        curl --location 'https://api.cleartrip.com/hotels/api/v4/content/hotel-profile/122897' \
        --header 'X-CT-API-KEY: *API_KEY*' \
        --header 'x-meta-data: {"locationVersion":"*VERSION*"}' \
        --header 'x-request-id: *REQUEST_ID*'
  parameters:
    - $ref: '../../components/schemas/parameters/x-api-key-header.yaml'
    - $ref: '../../components/schemas/parameters/x-tracking-id-header.yaml'
    - name: hotelId
      in: path
      description: The unique identifier associated with the Hotel.
      required: true
      schema:
        type: string
        example: "23456"
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/content/response/hotel-profile-response.yaml'
          example:
            hotelId: "122897"
            hotelContent:
              name: " Featherlite Evoma Hotel"
              description: "Evoma - Business Hotel, in K R Puram, Bangalore, is a 4-star business hotel which provides luxurious accommodation and excellent service to business travellers. The Hotel is located close to Whitefield Bangalore's IT Hub & Inustrial Areas like Hosakote, Narsapura, Vemgal & Malur ,offering a convenient location to those travelling to Bangalore on business.\n\nWe provide a choice of 65 luxurious and well-appointed rooms with numerous conveniences at your disposal. Our rooms are designed to ensure that your stay is meaningful and productive. We provide you with an atmosphere of comfort and relaxation. The rooms therefore have amenities such as in-room safe, free internet access, and audio and video conferencing."
              property:
                name: "Hotel"
                code: "HOT"
                type: "Hotel"
