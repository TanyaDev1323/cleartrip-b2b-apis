
type: object
properties:
  hasNextPage:
    type: boolean
    description: Indicates if there are more pages of data.
  nextPageToken:
    type: string
    description: Token used to retrieve the next page of results
  hotels:
    type: array
    description: Array of hotel objects.
    items:
      $ref: './hotel-object.yaml'
required:
  - hasNextPage
  - nextPageToken
  - hotels
example:
  hasNextPage: true
  nextPageToken: "WyI0NTYyNjc4Il0="
  hotels:
    - hotelId: 122890
    - hotelId: 122897
    - hotelId: 1324732
    - hotelId: 1324888
    - hotelId: 1324906
    - "..."
    